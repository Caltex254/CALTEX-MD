# =============================================================================
# CALTEX MD - Dependency Check Workflow
# =============================================================================
name: Dependency Check

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Check for Outdated Dependencies
  # ---------------------------------------------------------------------------
  check-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated packages
        id: outdated
        run: |
          OUTDATED=$(npm outdated || true)
          if [ -n "$OUTDATED" ]; then
            echo "outdated=true" >> $GITHUB_OUTPUT
            echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$OUTDATED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "outdated=false" >> $GITHUB_OUTPUT
            echo "All dependencies are up to date! ✅" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Security Audit
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          AUDIT_OUTPUT=$(npm audit --json 2>/dev/null || true)
          VULN_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.total // 0')
          HIGH_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.high // 0')
          CRITICAL_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.critical // 0')

          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT

          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "vulnerabilities=true" >> $GITHUB_OUTPUT
            echo "## ⚠️ Security Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Total**: $VULN_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- **Critical**: $CRITICAL_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- **High**: $HIGH_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            npm audit >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          else
            echo "vulnerabilities=false" >> $GITHUB_OUTPUT
            echo "No security vulnerabilities found! ✅" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create issue for vulnerabilities
        if: steps.audit.outputs.vulnerabilities == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const vulnCount = '${{ steps.audit.outputs.vuln_count }}';
            const criticalCount = '${{ steps.audit.outputs.critical_count }}';
            const highCount = '${{ steps.audit.outputs.high_count }}';

            // Check for existing open issue with the same title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
              per_page: 10
            });

            const existingIssue = issues.data.find(
              issue => issue.title === '🚨 Security Vulnerabilities Detected'
            );

            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `**Updated security scan results** (${new Date().toISOString().split('T')[0]})\n\n- Total: ${vulnCount}\n- Critical: ${criticalCount}\n- High: ${highCount}\n\nPlease run \`npm audit\` for details.`
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Security Vulnerabilities Detected',
                body: `Security vulnerabilities were detected during the weekly dependency check.\n\n- **Total**: ${vulnCount}\n- **Critical**: ${criticalCount}\n- **High**: ${highCount}\n\nPlease run \`npm audit\` for details and fix the vulnerabilities.\n\nThis issue was auto-generated by the [Dependency Check workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
                labels: ['security', 'bug', 'priority:high']
              });
            }

  # ---------------------------------------------------------------------------
  # Auto-update Minor Patches
  # ---------------------------------------------------------------------------
  auto-update:
    name: Auto-update Minor Patches
    runs-on: ubuntu-latest
    needs: [check-outdated, security-audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update minor and patch versions
        run: |
          npm update --save
          npm audit fix --only=prod || true

      - name: Run tests after update
        run: npm test --if-present
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): auto-update minor and patch dependencies"
          title: "chore(deps): auto-update minor and patch dependencies"
          body: |
            ## 🤖 Automated Dependency Update

            This PR was auto-generated by the weekly dependency check workflow.

            ### Changes
            - Updated minor and patch version dependencies
            - Applied safe security fixes (`npm audit fix --only=prod`)

            ### Checklist
            - [ ] Verify all tests pass
            - [ ] Review package changes
            - [ ] Confirm no breaking changes

            ---
            *This PR was created by the [Dependency Check workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          branch: deps/auto-update
          base: main
          labels: dependencies,automated
          delete-branch: true
