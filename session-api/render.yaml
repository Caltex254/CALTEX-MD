services:
  - type: web
    name: caltex-session-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3031
      - key: CORS_ORIGINS
        value: https://caltex-md.vercel.app
      - key: SESSION_EXPIRY_MS
        value: 1800000
      - key: CLEANUP_INTERVAL_MS
        value: 300000
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 30
      - key: BROWSER_NAME
        value: CALTEX MD
      - key: SESSIONS_DIR
        value: ./sessions
    healthCheckPath: /health
    autoDeploy: true
